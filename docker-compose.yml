version: '3.8'

services:

  postgres:

    image: postgres

    container_name: postgres-bank

    environment:
      POSTGRES_DB: banking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    networks:
      - bank-network

  redis:

    image: redis

    container_name: redis-bank

    ports:
      - "6379:6379"

    networks:
      - bank-network

  banking-app:

    build: .

    container_name: banking-system-app

    ports:
      - "8080:8080"

    depends_on:
      - postgres
      - redis

    environment:

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/banking_db

      SPRING_DATASOURCE_USERNAME: postgres

      SPRING_DATASOURCE_PASSWORD: postgres

      SPRING_DATA_REDIS_HOST: redis

      SPRING_DATA_REDIS_PORT: 6379

    networks:
      - bank-network

networks:

  bank-network: